events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    upstream propelsync_api {
        server api:8000;
    }

    upstream propelsync_keycloak {
        server keycloak:8080;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location = /propelsync {
            return 301 /propelsync/;
        }

        location /propelsync/api/v1/ {
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /propelsync;
            proxy_pass http://propelsync_api/api/v1/;
        }

        location /propelsync/ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /propelsync/index.html;
        }

        location /realms/ {
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://propelsync_keycloak;
        }

        location /resources/ {
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://propelsync_keycloak;
        }
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        ssl_certificate /etc/nginx/certs/propelsync-selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/propelsync-selfsigned.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy no-referrer-when-downgrade always;

        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location = /propelsync {
            return 301 /propelsync/;
        }

        location /propelsync/api/v1/ {
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /propelsync;
            proxy_pass http://propelsync_api/api/v1/;
        }

        location /propelsync/ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /propelsync/index.html;
        }

        location /realms/ {
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://propelsync_keycloak;
        }

        location /resources/ {
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://propelsync_keycloak;
        }
    }
}
